# Development compose — builds from source.
# Usage: docker compose -f infra/docker-compose.yml --profile dev up -d
#
# For production, use docker-compose.prod.yml instead.

name: mampfi

services:
  db:
    image: postgres:18-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-mampfi} -d $${POSTGRES_DB:-mampfi} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mampfi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mampfi}
      POSTGRES_DB: ${POSTGRES_DB:-mampfi}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"

  api:
    build:
      context: ../backend
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-mampfi}:${POSTGRES_PASSWORD:-mampfi}@db:5432/${POSTGRES_DB:-mampfi}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    profiles: ["dev"]

  worker:
    build:
      context: ../backend
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-mampfi}:${POSTGRES_PASSWORD:-mampfi}@db:5432/${POSTGRES_DB:-mampfi}"
    command: ["python", "-m", "mampfi_api.worker"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["dev"]

  migrate:
    build:
      context: ../backend
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-mampfi}:${POSTGRES_PASSWORD:-mampfi}@db:5432/${POSTGRES_DB:-mampfi}"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    profiles: ["migrate"]

  web:
    build:
      context: ../frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-}
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "8080:8080"
    profiles: ["dev"]

volumes:
  pgdata:
