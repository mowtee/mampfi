<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; color: #1a1a1a; max-width: 560px; margin: 0 auto; padding: 24px; }
    a { color: #2563eb; }
    .btn { display: inline-block; padding: 10px 20px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 6px; }
    .footer { margin-top: 32px; font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
  <div class="footer">
    {% block footer %}— Mampfi{% endblock %}
  </div>
</body>
</html>
