server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;

  # Serve index for SPA routes (client-side routing)
  location / {
    try_files $uri /index.html;
  }

  # Do not cache HTML (so updates are picked up quickly)
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Cache static assets aggressively (filenames are hashed by Vite)
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}

