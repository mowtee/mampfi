name: Prune old container images

on:
  schedule:
    # Sunday 04:13 UTC — off-peak, off-hour to avoid GitHub fleet alignment.
    - cron: "13 4 * * 0"
  workflow_dispatch:

permissions:
  packages: write

jobs:
  prune:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [mampfi-api, mampfi-web]
    steps:
      - name: Delete old ${{ matrix.package }} versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          # Keep the 6 newest version manifests so we always have a few
          # rollback targets beyond what's currently deployed.
          min-versions-to-keep: 6
          # Skip floating tags: `latest` and any minor-stream tag like `0.6`.
          # Specific patch versions (0.6.2, 0.6.1, …) are eligible for pruning.
          ignore-versions: '^(latest|\d+\.\d+)$'
          delete-only-untagged-versions: false
